NANO_ARCH=aarch64
NANO_DRIVE=mmcsd0
NANO_NAME=nanopi-neo2
NANO_BOOT_PKG=u-boot-nanopi-neo2
NANO_BOOT_FILE=u-boot-sunxi-with-spl.bin
NANO_BOOT_BS=128k
NANO_BOOT_SEEK=1

DO_ENABLE_SSHD=true

INSTALLFILESDIR="/media/nanobsd/15.0"
DO_DOWNLOAD_RELEASE=true
DOWNLOAD_SITE=http://ftp.freebsd.org
ARCH=$(uname -m)
RELEASE=$(uname -r|sed -e 's/-p.*$//')
DO_FETCH_UPDATES=false
DO_INSTALL_UPDATES=false

NANO_TIME_ZONE=Japan
# package list to be installed
NANO_PACKAGE_LIST=""

. no_build.nano

. common    # Pull in common definitions, keep last

